services:
  api:
    build: .
    env_file:
      - .env
    ports:
      - "8080:8080"
    command: uvicorn pharmagenie.api.main:app --host 0.0.0.0 --port 8080

  ui:
    build: .
    env_file:
      - .env
    ports:
      - "8501:8501"
    command: streamlit run src/pharmagenie/ui/streamlit_app.py --server.address 0.0.0.0 --server.port 8501
    depends_on:
      - api
